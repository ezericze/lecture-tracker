<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lecture Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1a1814;
    --muted: #6b6560;
    --green: #2d6a4f;
    --green-bg: #d8f3dc;
    --amber: #b45309;
    --amber-bg: #fef3c7;
    --red: #9b1c1c;
    --red-bg: #fee2e2;
    --accent: #2d6a4f;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  .mono { font-family: 'DM Mono', monospace; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #save-indicator {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: color .2s;
  }
  #header-right { display: flex; align-items: center; gap: 10px; }
  #manual-save-btn {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  #manual-save-btn:hover { background: var(--accent); color: #fff; }
  #save-indicator.saving { color: var(--amber); }
  #save-indicator.saved  { color: var(--green); }
  #save-indicator.failed { color: var(--red); }

  /* ── Layout ── */
  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  /* ── Dashboard ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 600px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }

  /* ── Progress bar ── */
  .progress-wrap { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }

  /* ── Section title ── */
  .section-title-row { display: flex; align-items: center; gap: 8px; margin: 28px 0 12px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin: 0;
  }
  #reorder-toggle {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  #reorder-toggle.active { border-color: var(--accent); color: var(--accent); background: var(--green-bg); }

  /* ── Drag handles ── */
  .drag-handle {
    display: none;
    align-items: center;
    justify-content: center;
    width: 20px;
    color: var(--border);
    cursor: grab;
    font-size: 16px;
    flex-shrink: 0;
    user-select: none;
  }
  .drag-mode .drag-handle { display: flex; }
  .drag-mode .module-card { cursor: default; }
  .module-card.dragging { opacity: 0.35; }
  .module-card.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* ── Pacing panel ── */
  .pacing-panel { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .pacing-stat { font-size: 13px; color: var(--muted); }
  .pacing-stat strong { font-family: 'DM Mono', monospace; color: var(--text); }
  .pacing-sep { color: var(--border); }

  /* ── Pill badge ── */
  .pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    letter-spacing: .02em;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-red   { background: var(--red-bg);   color: var(--red); }

  /* ── Date picker row ── */
  .date-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .date-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  input[type="date"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 9px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }
  input[type="date"]:focus { outline: none; border-color: var(--accent); }

  /* ── Module card ── */
  .module-list { display: flex; flex-direction: column; gap: 14px; }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    cursor: default;
  }

  .color-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .15s;
  }
  .color-dot:hover { transform: scale(1.25); }

  .module-name-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text);
    flex: 1;
    min-width: 0;
    outline: none;
  }
  .module-name-input:focus { border-bottom: 1.5px solid var(--accent); }

  .module-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .module-progress-wrap { padding: 0 16px 4px; }

  .module-sub-header {
    padding: 8px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
    transition: background .15s, color .15s;
  }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.danger:hover { background: var(--red-bg); color: var(--red); }

  .filter-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    margin-left: auto;
  }
  .filter-select:focus { outline: none; border-color: var(--accent); }

  /* ── Module pacing strip ── */
  .module-pacing {
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── Lectures ── */
  .lecture-list { }

  .lecture-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .lecture-row:last-child { border-bottom: none; }
  .lecture-row:hover { background: #faf9f6; }
  .lecture-row.hidden { display: none; }
  .lecture-row.watched { opacity: .55; }

  .lecture-checkbox {
    width: 17px; height: 17px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .lecture-name-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    border: none;
    background: transparent;
    color: var(--text);
    flex: 1;
    min-width: 0;
    outline: none;
  }
  .lecture-name-input:focus { border-bottom: 1px solid var(--accent); }
  .lecture-row.watched .lecture-name-input { text-decoration: line-through; color: var(--muted); }

  .duration-input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 52px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 6px;
    background: var(--bg);
    color: var(--text);
    text-align: right;
    flex-shrink: 0;
  }
  .duration-input:focus { outline: none; border-color: var(--accent); }
  .duration-unit { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* ── Add lecture button ── */
  .add-lecture-row {
    padding: 9px 16px;
  }
  .btn-ghost {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 7px;
    padding: 6px 14px;
    cursor: pointer;
    color: var(--muted);
    width: 100%;
    text-align: left;
    transition: border-color .15s, color .15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Add module section ── */
  .add-module-section {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .add-module-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .add-module-input:focus { border-color: var(--accent); }
  .btn-primary {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .88; }

  /* ── Footer actions ── */
  .footer-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .btn-outline {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-outline:hover { background: var(--bg); }
  .btn-outline.danger { color: var(--red); }
  .btn-outline.danger:hover { background: var(--red-bg); border-color: var(--red); }

  /* ── Toasts ── */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }
  .toast {
    background: var(--text);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    animation: slideIn .2s ease;
    max-width: 260px;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .collapse-body { }
  .collapse-body.collapsed { display: none; }
</style>
</head>
<body>

<header>
  <h1>Lecture Tracker</h1>
  <div id="header-right">
    <span id="save-indicator"></span>
    <button id="manual-save-btn">Save</button>
  </div>
</header>

<div class="container">

  <!-- Dashboard -->
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Completion</div>
      <div class="stat-value mono" id="stat-completion">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Time</div>
      <div class="stat-value mono" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Remaining</div>
      <div class="stat-value mono" id="stat-remaining">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Modules</div>
      <div class="stat-value mono" id="stat-modules">—</div>
    </div>
  </div>
  <div class="card" style="padding: 14px 20px;">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;">
      <span>Overall progress</span>
      <span id="global-pct-label" class="mono">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="global-progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Global pacing -->
  <p class="section-title">Overall Pacing</p>
  <div class="card">
    <div class="date-row">
      <label for="global-deadline">Target completion date</label>
      <input type="date" id="global-deadline" />
    </div>
    <div id="global-pacing-strip" class="pacing-panel" style="display:none"></div>
  </div>

  <!-- Modules -->
  <div class="section-title-row">
    <button id="reorder-toggle">⇅ Reorder</button>
    <p class="section-title">Modules</p>
  </div>
  <div class="module-list" id="module-list"></div>

  <!-- Add module -->
  <div class="add-module-section">
    <input type="text" class="add-module-input" id="new-module-input" placeholder="New module name…" />
    <button class="btn-primary" id="add-module-btn">Add Module</button>
  </div>

  <!-- Footer actions -->
  <div class="footer-actions">
    <button class="btn-outline" id="export-btn">Export CSV</button>
  </div>

</div>

<div id="toast-container"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const COLORS = ['#e07a5f','#3d405b','#81b29a','#f2cc8f','#a8dadc','#c77dff','#f4a261','#2d6a4f'];

// ── State ──────────────────────────────────────────────────────────────────
let state = { targetDate: '', modules: [] };
let saveTimer = null;
let filters = {}; // moduleId -> 'all'|'unwatched'|'watched'

// ── Utilities ──────────────────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2,9) + Date.now().toString(36);
}

function fmtMins(mins) {
  if (!mins || mins < 0) return '0h 0m';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function daysFromNow(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr + 'T00:00:00');
  return Math.ceil((target - today) / 86400000);
}

function pillClass(hrsPerDay) {
  if (hrsPerDay < 1) return 'pill-green';
  if (hrsPerDay <= 2) return 'pill-amber';
  return 'pill-red';
}
function pillLabel(hrsPerDay) {
  if (hrsPerDay < 1) return 'On track';
  if (hrsPerDay <= 2) return 'Manageable';
  return 'Heavy load';
}

function pacingHTML(days, unwatchedCount, unwatchedMins) {
  if (days === null) return '';
  if (days <= 0) return `<span class="pill pill-red">Deadline passed</span>`;
  const lpd = (unwatchedCount / days).toFixed(1);
  const hpd = unwatchedMins / 60 / days;
  const hpdLabel = hpd < 0.1 ? '<0.1' : hpd.toFixed(1);
  const cls = pillClass(hpd);
  const lbl = pillLabel(hpd);
  return `
    <span class="pacing-stat"><strong>${days}</strong> days left</span>
    <span class="pacing-sep">·</span>
    <span class="pacing-stat"><strong>${lpd}</strong> lectures/day</span>
    <span class="pacing-sep">·</span>
    <span class="pacing-stat"><strong>${hpdLabel}</strong> hrs/day</span>
    <span class="pill ${cls}">${lbl}</span>
  `;
}

// ── Save ───────────────────────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveState('saving');
  saveTimer = setTimeout(doSave, 800);
}

document.getElementById('manual-save-btn').addEventListener('click', () => {
  clearTimeout(saveTimer);
  doSave();
});

function setSaveState(s) {
  const el = document.getElementById('save-indicator');
  el.className = s;
  el.textContent = s === 'saving' ? 'saving…' : s === 'saved' ? 'saved ✓' : s === 'failed' ? 'save failed' : '';
}

async function doSave() {
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error();
    setSaveState('saved');
    setTimeout(() => setSaveState(''), 2500);
  } catch {
    setSaveState('failed');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Compute stats ──────────────────────────────────────────────────────────
function computeStats() {
  let totalLectures = 0, watchedLectures = 0, totalMins = 0, watchedMins = 0;
  for (const mod of state.modules) {
    for (const lec of mod.lectures) {
      totalLectures++;
      totalMins += lec.duration || 0;
      if (lec.watched) { watchedLectures++; watchedMins += lec.duration || 0; }
    }
  }
  return { totalLectures, watchedLectures, totalMins, watchedMins,
           unwatchedLectures: totalLectures - watchedLectures,
           unwatchedMins: totalMins - watchedMins,
           pct: totalLectures ? Math.round(watchedLectures / totalLectures * 100) : 0 };
}

// ── Render dashboard ───────────────────────────────────────────────────────
function renderDashboard() {
  const s = computeStats();
  document.getElementById('stat-completion').textContent = s.pct + '%';
  document.getElementById('stat-total').textContent = fmtMins(s.totalMins);
  document.getElementById('stat-remaining').textContent = fmtMins(s.unwatchedMins);
  document.getElementById('stat-modules').textContent = state.modules.length;
  document.getElementById('global-progress-fill').style.width = s.pct + '%';
  document.getElementById('global-pct-label').textContent = s.pct + '%';

  // pacing
  const days = daysFromNow(state.targetDate);
  const strip = document.getElementById('global-pacing-strip');
  if (days !== null) {
    strip.style.display = 'flex';
    strip.innerHTML = pacingHTML(days, s.unwatchedLectures, s.unwatchedMins);
  } else {
    strip.style.display = 'none';
  }
}

// ── Render modules ─────────────────────────────────────────────────────────
function renderModules() {
  const container = document.getElementById('module-list');
  container.innerHTML = '';
  for (let i = 0; i < state.modules.length; i++) {
    container.appendChild(buildModuleEl(state.modules[i], i));
  }
}

function buildModuleEl(mod, idx) {
  const filter = filters[mod.id] || 'all';
  const totalMins = mod.lectures.reduce((a,l) => a + (l.duration||0), 0);
  const watchedCount = mod.lectures.filter(l=>l.watched).length;
  const unwatchedLecs = mod.lectures.filter(l=>!l.watched);
  const unwatchedMins = unwatchedLecs.reduce((a,l)=>a+(l.duration||0),0);
  const pct = mod.lectures.length ? Math.round(watchedCount / mod.lectures.length * 100) : 0;

  const card = document.createElement('div');
  card.className = 'module-card';
  card.dataset.id = mod.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'module-header';

  const dragHandle = document.createElement('div');
  dragHandle.className = 'drag-handle';
  dragHandle.textContent = '⠿';
  dragHandle.addEventListener('mousedown', () => { card.draggable = true; });
  dragHandle.addEventListener('mouseup', () => { card.draggable = false; });
  hdr.appendChild(dragHandle);

  const dot = document.createElement('div');
  dot.className = 'color-dot';
  dot.style.background = COLORS[mod.color % COLORS.length];
  dot.title = 'Click to change colour';
  dot.addEventListener('click', () => {
    mod.color = (mod.color + 1) % COLORS.length;
    scheduleSave();
    renderAll();
  });

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'module-name-input';
  nameInput.value = mod.name;
  nameInput.addEventListener('change', () => { mod.name = nameInput.value; scheduleSave(); renderDashboard(); });

  const badge = document.createElement('span');
  badge.className = 'module-badge';
  badge.textContent = `${watchedCount}/${mod.lectures.length} · ${fmtMins(totalMins)}`;

  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'btn-icon';
  collapseBtn.title = mod.collapsed ? 'Expand' : 'Collapse';
  collapseBtn.textContent = mod.collapsed ? '▶' : '▼';
  collapseBtn.addEventListener('click', () => {
    mod.collapsed = !mod.collapsed;
    scheduleSave();
    renderAll();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon danger';
  delBtn.title = 'Delete module';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', () => {
    if (!confirm(`Delete module "${mod.name}" and all its lectures?`)) return;
    state.modules.splice(idx, 1);
    delete filters[mod.id];
    scheduleSave();
    renderAll();
  });

  hdr.append(dot, nameInput, badge, collapseBtn, delBtn);
  card.appendChild(hdr);

  // Progress bar
  const progWrap = document.createElement('div');
  progWrap.className = 'module-progress-wrap';
  progWrap.innerHTML = `<div class="progress-wrap" style="margin-bottom:10px"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  card.appendChild(progWrap);

  // Collapse body
  const body = document.createElement('div');
  body.className = 'collapse-body' + (mod.collapsed ? ' collapsed' : '');

  // Module sub-header (deadline + filter)
  const subHdr = document.createElement('div');
  subHdr.className = 'module-sub-header';

  const dateLabel = document.createElement('label');
  dateLabel.style.cssText = 'font-size:12px;color:var(--muted);white-space:nowrap';
  dateLabel.textContent = 'Deadline:';

  const datePicker = document.createElement('input');
  datePicker.type = 'date';
  datePicker.value = mod.deadline || '';
  datePicker.style.fontSize = '12px';
  datePicker.addEventListener('change', () => { mod.deadline = datePicker.value; scheduleSave(); renderAll(); });

  const filterSel = document.createElement('select');
  filterSel.className = 'filter-select';
  ['all','unwatched','watched'].forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v === 'all' ? 'All' : v === 'unwatched' ? 'Unwatched only' : 'Watched only';
    if (v === filter) o.selected = true;
    filterSel.appendChild(o);
  });
  filterSel.addEventListener('change', () => { filters[mod.id] = filterSel.value; renderAll(); });

  subHdr.append(dateLabel, datePicker, filterSel);
  body.appendChild(subHdr);

  // Module pacing strip
  const days = daysFromNow(mod.deadline);
  if (days !== null) {
    const strip = document.createElement('div');
    strip.className = 'module-pacing';
    strip.innerHTML = pacingHTML(days, unwatchedLecs.length, unwatchedMins);
    body.appendChild(strip);
  }

  // Lectures
  const lecList = document.createElement('div');
  lecList.className = 'lecture-list';

  mod.lectures.forEach((lec, li) => {
    const row = buildLectureRow(mod, lec, li, filter);
    lecList.appendChild(row);
  });

  body.appendChild(lecList);

  // Add lecture
  const addRow = document.createElement('div');
  addRow.className = 'add-lecture-row';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-ghost';
  addBtn.textContent = '+ Add lecture';
  addBtn.addEventListener('click', () => {
    mod.lectures.push({ id: uid(), name: `Lecture ${mod.lectures.length + 1}`, duration: 60, watched: false });
    scheduleSave();
    renderAll();
  });
  addRow.appendChild(addBtn);
  body.appendChild(addRow);

  card.appendChild(body);
  return card;
}

function buildLectureRow(mod, lec, li, filter) {
  const row = document.createElement('div');
  row.className = 'lecture-row' + (lec.watched ? ' watched' : '');
  if ((filter === 'unwatched' && lec.watched) || (filter === 'watched' && !lec.watched)) {
    row.classList.add('hidden');
  }

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'lecture-checkbox';
  cb.checked = lec.watched;
  cb.addEventListener('change', () => {
    lec.watched = cb.checked;
    if (lec.watched) toast(`"${lec.name}" marked as watched`);
    scheduleSave();
    renderAll();
  });

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'lecture-name-input';
  nameInput.value = lec.name;
  nameInput.addEventListener('change', () => { lec.name = nameInput.value; scheduleSave(); renderDashboard(); });

  const durInput = document.createElement('input');
  durInput.type = 'number';
  durInput.className = 'duration-input';
  durInput.value = lec.duration || 0;
  durInput.min = 0;
  durInput.addEventListener('change', () => {
    lec.duration = parseInt(durInput.value) || 0;
    scheduleSave();
    renderAll();
  });

  const durUnit = document.createElement('span');
  durUnit.className = 'duration-unit';
  durUnit.textContent = 'min';

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon danger';
  delBtn.title = 'Delete lecture';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', () => {
    if (!confirm(`Delete lecture "${lec.name}"?`)) return;
    mod.lectures.splice(li, 1);
    scheduleSave();
    renderAll();
  });

  row.append(cb, nameInput, durInput, durUnit, delBtn);
  return row;
}

// ── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderModules();
}

// ── Global deadline ────────────────────────────────────────────────────────
document.getElementById('global-deadline').addEventListener('change', function() {
  state.targetDate = this.value;
  scheduleSave();
  renderAll();
});

// ── Reorder (drag & drop) ──────────────────────────────────────────────────
let dragMode = false;
let dragSrcId = null;

document.getElementById('reorder-toggle').addEventListener('click', () => {
  dragMode = !dragMode;
  document.getElementById('reorder-toggle').classList.toggle('active', dragMode);
  document.getElementById('module-list').classList.toggle('drag-mode', dragMode);
});

document.getElementById('module-list').addEventListener('dragstart', e => {
  const card = e.target.closest('.module-card');
  if (!card) return;
  dragSrcId = card.dataset.id;
  setTimeout(() => card.classList.add('dragging'), 0);
});

document.getElementById('module-list').addEventListener('dragend', e => {
  const card = e.target.closest('.module-card');
  if (card) { card.classList.remove('dragging'); card.draggable = false; }
  document.querySelectorAll('.module-card.drag-over').forEach(c => c.classList.remove('drag-over'));
});

document.getElementById('module-list').addEventListener('dragover', e => {
  e.preventDefault();
  const card = e.target.closest('.module-card');
  if (!card || card.dataset.id === dragSrcId) return;
  document.querySelectorAll('.module-card.drag-over').forEach(c => c.classList.remove('drag-over'));
  card.classList.add('drag-over');
});

document.getElementById('module-list').addEventListener('drop', e => {
  e.preventDefault();
  const card = e.target.closest('.module-card');
  if (!card || card.dataset.id === dragSrcId) return;
  const srcIdx = state.modules.findIndex(m => m.id === dragSrcId);
  const dstIdx = state.modules.findIndex(m => m.id === card.dataset.id);
  if (srcIdx === -1 || dstIdx === -1) return;
  const [moved] = state.modules.splice(srcIdx, 1);
  state.modules.splice(dstIdx, 0, moved);
  renderModules();
  document.getElementById('module-list').classList.toggle('drag-mode', dragMode);
  scheduleSave();
});

// ── Add module ─────────────────────────────────────────────────────────────
document.getElementById('add-module-btn').addEventListener('click', () => {
  const input = document.getElementById('new-module-input');
  const name = input.value.trim() || 'New Module';
  state.modules.push({ id: uid(), name, color: state.modules.length % COLORS.length, collapsed: false, deadline: '', lectures: [] });
  input.value = '';
  scheduleSave();
  renderAll();
  toast(`Module "${name}" added`);
});
document.getElementById('new-module-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('add-module-btn').click();
});


// ── Export CSV ─────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const rows = [['Module','Lecture','Duration (min)','Watched']];
  state.modules.forEach(m => {
    m.lectures.forEach(l => {
      rows.push([
        `"${m.name.replace(/"/g,'""')}"`,
        `"${l.name.replace(/"/g,'""')}"`,
        l.duration || 0,
        l.watched ? 'Yes' : 'No'
      ]);
    });
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'lectures.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported');
});

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error();
    state = await res.json();
  } catch {
    state = defaultState();
  }
  document.getElementById('global-deadline').value = state.targetDate || '';
  renderAll();
}

function defaultState() {
  return {
    targetDate: '',
    modules: [
      {
        id: uid(), name: 'Example Module', color: 0, collapsed: false, deadline: '',
        lectures: [
          { id: uid(), name: 'Introduction', duration: 45, watched: false },
          { id: uid(), name: 'Core Concepts', duration: 60, watched: false },
          { id: uid(), name: 'Worked Examples', duration: 50, watched: false }
        ]
      }
    ]
  };
}

init();
</script>
</body>
</html>
